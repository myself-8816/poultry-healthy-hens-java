apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    app: app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: app

  template:
    metadata:
      labels:
        app: app

    spec:
      containers:
      - name: app-container
        image: pavansai33/pouimage:v1
        ports:
        - containerPort: 8080



       

---
apiVersion: v1
kind: Service
metadata:
  name: app-service

spec:
  type: LoadBalancer

  selector:
    app: app

  ports:
    - name: http
      port: 80           # service port
      targetPort: 8080   # container port
      
